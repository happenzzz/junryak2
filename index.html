
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>36÷4 배구공 바구니 배열하기</title>
  <style>
    :root {
      --ink: #142136;
      --navy: #243f6d;
      --teal: #11bdc8;
      --teal-dark: #078391;
      --green: #63c94d;
      --red: #ff5f6d;
      --card: rgba(255, 255, 255, .94);
      --line: rgba(36, 63, 109, .16);
      --shadow: 0 18px 42px rgba(36, 63, 109, .14);
      --radius: clamp(18px, 1.35vw, 28px);
      --ball-source: clamp(42px, 3.25vw, 58px);
      --ball-basket: clamp(44px, 3.2vw, 62px);
      --ball-touch-pad: 10px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 3% -5%, rgba(255, 229, 131, .96) 0 210px, transparent 211px),
        radial-gradient(circle at 96% 0%, rgba(17, 189, 200, .22) 0 260px, transparent 261px),
        linear-gradient(135deg, #f3fbff 0%, #fbfffb 48%, #fff8e8 100%);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    button:focus-visible {
      outline: 0;
      box-shadow: 0 0 0 6px rgba(17, 189, 200, .24);
    }

    .activity {
      width: min(1920px, 100%);
      height: 100dvh;
      margin: 0 auto;
      padding: clamp(8px, 1vw, 18px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: clamp(8px, .75vw, 14px);
      position: relative;
    }

    .activity:fullscreen,
    .activity:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      max-width: none;
      background:
        radial-gradient(circle at 3% -5%, rgba(255, 229, 131, .96) 0 210px, transparent 211px),
        radial-gradient(circle at 96% 0%, rgba(17, 189, 200, .22) 0 260px, transparent 261px),
        linear-gradient(135deg, #f3fbff 0%, #fbfffb 48%, #fff8e8 100%);
    }

    .source-panel,
    .basket-card {
      background: var(--card);
      border: 3px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .source-panel {
      min-height: clamp(124px, 17vh, 190px);
      padding: clamp(8px, .75vw, 14px) clamp(10px, 1vw, 18px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: clamp(6px, .55vw, 10px);
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
      overflow: visible;
    }

    .source-panel.drop-ready,
    .basket-card.drop-ready {
      border-color: rgba(17, 189, 200, .76);
      box-shadow: 0 0 0 7px rgba(17, 189, 200, .14), var(--shadow);
      transform: translateY(-1px);
    }

    .source-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: clamp(8px, .8vw, 16px);
      min-width: 0;
    }

    .title-wrap {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 13px;
      border-radius: 999px;
      background: #e9fcff;
      color: var(--teal-dark);
      font-size: clamp(14px, .95vw, 20px);
      font-weight: 1000;
      letter-spacing: -.04em;
      white-space: nowrap;
      box-shadow: inset 0 -4px 0 rgba(17, 189, 200, .11);
    }

    .title {
      color: var(--navy);
      font-size: clamp(22px, 1.75vw, 36px);
      line-height: 1.05;
      font-weight: 1000;
      letter-spacing: -0.06em;
      word-break: keep-all;
    }

    .source-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .count-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: clamp(90px, 6.5vw, 128px);
      min-height: clamp(38px, 2.6vw, 52px);
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--navy);
      color: #fff;
      font-size: clamp(16px, 1.08vw, 23px);
      line-height: 1;
      font-weight: 1000;
      white-space: nowrap;
      box-shadow: 0 7px 0 rgba(36, 63, 109, .15);
    }

    .mini-btn,
    .fullscreen-toggle {
      min-height: clamp(38px, 2.6vw, 52px);
      padding: 8px clamp(11px, .9vw, 17px);
      border-radius: 999px;
      font-size: clamp(13px, .9vw, 19px);
      font-weight: 1000;
      letter-spacing: -.045em;
      white-space: nowrap;
      transition: transform .12s ease, filter .12s ease, opacity .12s ease;
    }

    .mini-btn {
      background: #eef7ff;
      color: var(--navy);
      box-shadow: inset 0 -4px 0 rgba(36, 63, 109, .07);
    }

    .fullscreen-toggle {
      background: #e9fcff;
      color: var(--teal-dark);
      border: 2px solid rgba(17, 189, 200, .28);
      box-shadow: inset 0 -4px 0 rgba(17, 189, 200, .11);
    }

    .mini-btn:active,
    .fullscreen-toggle:active { transform: translateY(2px); }

    .source-items {
      min-height: calc(var(--ball-source) + 10px);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      align-content: center;
      gap: clamp(2px, .35vw, 7px);
      min-width: 0;
      overflow: visible;
    }

    .workspace {
      min-height: 0;
      overflow: hidden;
      position: relative;
    }

    .board {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: clamp(8px, .8vw, 16px);
      overflow: hidden;
      position: relative;
    }

    .basket-card {
      min-height: 0;
      padding: clamp(8px, .75vw, 14px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: clamp(6px, .55vw, 10px);
      position: relative;
      overflow: hidden;
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    }

    .basket-card.complete {
      border-color: rgba(99, 201, 77, .8);
      box-shadow: 0 0 0 7px rgba(99, 201, 77, .14), var(--shadow);
    }

    .basket-card.over {
      border-color: rgba(255, 95, 109, .72);
      box-shadow: 0 0 0 7px rgba(255, 95, 109, .12), var(--shadow);
    }

    .basket-head {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      position: relative;
      z-index: 10;
      padding: 2px 2px 0;
    }

    .basket-name {
      min-width: 0;
      color: var(--navy);
      font-size: clamp(18px, 1.35vw, 30px);
      line-height: 1;
      font-weight: 1000;
      letter-spacing: -0.055em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .basket-count {
      flex: 0 0 auto;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(36, 63, 109, .10);
      color: #33445f;
      font-size: clamp(14px, 1vw, 22px);
      line-height: 1;
      font-weight: 1000;
      white-space: nowrap;
    }

    .basket-area {
      min-height: 0;
      position: relative;
      border-radius: clamp(14px, 1.1vw, 24px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .46), rgba(247, 251, 255, .72));
      overflow: hidden;
      isolation: isolate;
    }

    .basket-photo {
      position: absolute;
      left: 50%;
      top: 50%;
      width: auto;
      height: min(98%, 720px);
      max-width: 118%;
      object-fit: contain;
      transform: translate(-50%, -50%) scaleY(1.03);
      transform-origin: center center;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 11px 15px rgba(36, 63, 109, .12));
      z-index: 1;
    }

    .drop-pad {
      position: absolute;
      left: 6%;
      right: 6%;
      top: 8%;
      height: 47%;
      z-index: 3;
      display: grid;
      place-items: center;
      border: 2px dashed rgba(255, 255, 255, .15);
      border-radius: 16px 16px 22px 22px;
      background: rgba(255, 255, 255, .04);
      transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }

    .basket-card.drop-ready .drop-pad {
      border-color: rgba(255, 255, 255, .72);
      background: rgba(233, 252, 255, .20);
      box-shadow:
        inset 0 0 0 5px rgba(17, 189, 200, .07),
        0 0 0 5px rgba(17, 189, 200, .09);
    }

    .basket-items {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      align-items: center;
      gap: clamp(2px, .35vw, 6px);
      padding: clamp(4px, .6vw, 10px);
      position: relative;
      z-index: 4;
    }

    .ball {
      width: calc(var(--ball-source) + var(--ball-touch-pad));
      height: calc(var(--ball-source) + var(--ball-touch-pad));
      flex: 0 0 calc(var(--ball-source) + var(--ball-touch-pad));
      padding: calc(var(--ball-touch-pad) / 2);
      border-radius: 50%;
      border: 0;
      background: transparent;
      touch-action: none;
      cursor: grab;
      position: relative;
      transition: transform .1s ease, filter .1s ease, opacity .1s ease;
      display: grid;
      place-items: center;
      will-change: transform;
    }

    .basket-items .ball {
      width: calc(var(--ball-basket) + var(--ball-touch-pad));
      height: calc(var(--ball-basket) + var(--ball-touch-pad));
      flex-basis: calc(var(--ball-basket) + var(--ball-touch-pad));
    }

    .ball:active { cursor: grabbing; }

    .ball-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 5px 2px rgba(36, 63, 109, .16));
    }

    .ball.selected { transform: translateY(-4px) scale(1.06); }
    .ball.selected::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 5px solid rgba(17, 189, 200, .78);
      box-shadow: 0 0 0 6px rgba(17, 189, 200, .16);
      pointer-events: none;
    }

    .ball.is-being-dragged { opacity: .18; }

    .drag-ghost {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 9999;
      pointer-events: none;
      margin: 0;
      transform-origin: center center;
      filter: drop-shadow(0 17px 20px rgba(0, 0, 0, .22));
      transition: none !important;
      will-change: transform;
    }

    .drag-ghost .ball-img { filter: none; }

    .activity:fullscreen .drag-ghost,
    .activity:-webkit-full-screen .drag-ghost { z-index: 2147483647; }

    @media (max-width: 1280px) and (orientation: landscape) {
      :root {
        --ball-source: clamp(34px, 3vw, 46px);
        --ball-basket: clamp(38px, 3vw, 50px);
        --ball-touch-pad: 8px;
      }

      .activity { padding: 8px; gap: 8px; }
      .source-panel { min-height: clamp(112px, 18vh, 154px); }
      .source-items { gap: 2px; }
      .board { gap: 8px; }
      .basket-card { padding: 8px; }
      .basket-name { font-size: clamp(17px, 1.6vw, 22px); }
      .basket-count { font-size: 14px; padding: 5px 8px; }
      .basket-items { gap: 1px; padding: 4px; }
      .drop-pad { top: 9%; height: 46%; left: 4%; right: 4%; }
    }

    @media (max-width: 900px), (orientation: portrait) {
      :root {
        --ball-source: clamp(30px, 5.2vw, 42px);
        --ball-basket: clamp(32px, 5.4vw, 44px);
        --ball-touch-pad: 8px;
      }

      .activity {
        height: 100svh;
        min-height: 0;
        padding: 7px;
        gap: 7px;
      }

      .source-panel {
        min-height: clamp(126px, 22vh, 206px);
        padding: 7px 9px;
        gap: 5px;
      }

      .source-head {
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 6px;
      }

      .title-wrap { gap: 6px; }
      .eyebrow { font-size: 12px; padding: 4px 8px; }
      .title { font-size: clamp(17px, 4.2vw, 24px); }
      .source-actions { justify-content: flex-start; gap: 5px; }
      .count-pill, .mini-btn, .fullscreen-toggle {
        min-height: 32px;
        font-size: 12px;
        padding: 5px 9px;
      }

      .board {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .basket-card { padding: 6px; gap: 5px; }
      .basket-head { gap: 5px; }
      .basket-name { font-size: clamp(13px, 3vw, 18px); }
      .basket-count { font-size: 11px; padding: 4px 6px; }
      .basket-photo {
        height: min(98%, 620px);
        max-width: 130%;
        transform: translate(-50%, -50%) scaleY(1.06);
      }
      .drop-pad { left: 3%; right: 3%; top: 8%; height: 47%; }
      .basket-items { gap: 1px; padding: 2px; }
    }

    @media (max-width: 560px) {
      :root {
        --ball-source: clamp(27px, 7vw, 36px);
        --ball-basket: clamp(29px, 7.2vw, 38px);
        --ball-touch-pad: 6px;
      }

      .board {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
      }

      .source-panel { min-height: clamp(126px, 25vh, 220px); }
      .basket-name { font-size: 15px; }
      .basket-count { font-size: 11px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="activity" aria-label="36 나누기 4 배구공 배열 활동">
    <section id="sourcePanel" class="source-panel" data-drop-target="source" aria-label="남은 배구공">
      <div class="source-head">
        <div class="title-wrap">
          <div class="eyebrow">36÷4</div>

          <button id="resetBtn" class="mini-btn" type="button">처음으로</button>

      const state = {
        pieces: [],
        selectedPiece: null,
        dragCleanup: null
      };

      const $ = (selector) => document.querySelector(selector);
      const $$ = (selector) => Array.from(document.querySelectorAll(selector));

      document.addEventListener("DOMContentLoaded", init, { once: true });
      document.addEventListener("dragstart", (event) => event.preventDefault());
      document.addEventListener("contextmenu", (event) => {
        if (event.target.closest(".ball")) event.preventDefault();
      });

      function init() {
        resetPieces(false);
        restoreState();
        attachEvents();
        renderPieces();
        updateFullscreenButton();
      }

      function attachEvents() {
        $("#resetBtn").addEventListener("click", resetAll);
        $("#clearSelectionBtn").addEventListener("click", clearSelection);
        $("#fullscreenBtn")?.addEventListener("click", (event) => {
          event.stopPropagation();
          toggleFullscreen();
        });

        document.addEventListener("fullscreenchange", updateFullscreenButton);
        document.addEventListener("webkitfullscreenchange", updateFullscreenButton);

        $("#sourcePanel").addEventListener("click", (event) => {
          if (event.target.closest(".ball") || event.target.closest("button")) return;
          if (state.selectedPiece !== null) movePiece(state.selectedPiece, "source");
        });

        $$(".basket-card").forEach((card) => {
          const target = Number(card.dataset.dropTarget);
          card.addEventListener("click", (event) => {
            if (event.target.closest(".ball") || event.target.closest("button")) return;
            if (state.selectedPiece !== null) movePiece(state.selectedPiece, target);
          });
        });

        window.addEventListener("resize", () => {
          if (state.selectedPiece !== null) highlightDropTargets(true);
        });
      }

      function resetPieces(clearStorage = true) {
        state.pieces = Array.from({ length: TOTAL }, (_, index) => ({
          id: index,
          place: "source"
        }));
        state.selectedPiece = null;
        if (clearStorage) clearSavedState();
      }

      function resetAll() {
        if (state.dragCleanup) state.dragCleanup();
        resetPieces(true);
        highlightDropTargets(false);
        renderPieces();
      }

      function clearSelection() {
        state.selectedPiece = null;
        highlightDropTargets(false);
        renderPieces();
        saveState();
      }

      function renderPieces() {
        const sourceItems = $("#sourceItems");
        sourceItems.innerHTML = "";
        $$("[data-basket-items]").forEach((zone) => { zone.innerHTML = ""; });

        state.pieces.forEach((piece) => {
          const element = createBallElement(piece);
          if (piece.place === "source") {
            sourceItems.appendChild(element);
          } else {
            const basket = $(`[data-basket-items="${piece.place}"]`);
            if (basket) basket.appendChild(element);
          }
        });

        updateCounts();
        saveState();
      }

      function createBallElement(piece) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `ball${state.selectedPiece === piece.id ? " selected" : ""}`;
        button.dataset.id = String(piece.id);
        button.setAttribute("aria-label", `배구공 ${piece.id + 1}`);
        button.innerHTML = `<img class="ball-img" src="${BALL_SRC}" alt="" draggable="false" aria-hidden="true" />`;
        attachBallPointer(button);
        return button;
      }

      function attachBallPointer(element) {
        element.addEventListener("pointerdown", (event) => {
          if (typeof event.button === "number" && event.button !== 0) return;
          event.preventDefault();
          event.stopPropagation();

          if (state.dragCleanup) state.dragCleanup();

          const id = Number(element.dataset.id);
          const pointerId = event.pointerId;
          const startX = event.clientX;
          const startY = event.clientY;
          let dragging = false;
          let ghost = null;
          let lastX = startX;
          let lastY = startY;
          let raf = 0;

          try { element.setPointerCapture(pointerId); } catch (error) { /* ignore */ }

          const updateGhost = () => {
            raf = 0;
            if (!ghost) return;
            const w = ghost.offsetWidth;
            const h = ghost.offsetHeight;
            ghost.style.transform =
              `translate3d(${lastX - w / 2}px, ${lastY - h / 2}px, 0) scale(1.18) rotate(-6deg)`;
          };

          const requestGhostUpdate = () => {
            if (!raf) raf = requestAnimationFrame(updateGhost);
          };

          const startDrag = (moveEvent) => {
            dragging = true;
            ghost = element.cloneNode(true);
            ghost.classList.add("drag-ghost");
            ghost.classList.remove("selected");
            ghost.style.width = `${element.offsetWidth}px`;
            ghost.style.height = `${element.offsetHeight}px`;
            getOverlayRoot().appendChild(ghost);
            element.classList.add("is-being-dragged");
            highlightDropTargets(true);
            lastX = moveEvent.clientX;
            lastY = moveEvent.clientY;
            requestGhostUpdate();
          };

          const onMove = (moveEvent) => {
            if (moveEvent.pointerId !== pointerId) return;
            if (moveEvent.cancelable) moveEvent.preventDefault();

            const distance = Math.hypot(moveEvent.clientX - startX, moveEvent.clientY - startY);
            if (!dragging && distance > 3) startDrag(moveEvent);

            if (dragging) {
              lastX = moveEvent.clientX;
              lastY = moveEvent.clientY;
              requestGhostUpdate();
            }
          };

          const cleanup = () => {
            if (raf) cancelAnimationFrame(raf);
            if (ghost) ghost.remove();
            element.classList.remove("is-being-dragged");
            highlightDropTargets(false);
            try {
              if (element.hasPointerCapture(pointerId)) element.releasePointerCapture(pointerId);
            } catch (error) { /* ignore */ }
            state.dragCleanup = null;
          };

          const onUp = (upEvent) => {
            if (upEvent.pointerId !== pointerId) return;
            element.removeEventListener("pointermove", onMove);
            element.removeEventListener("pointerup", onUp);
            element.removeEventListener("pointercancel", onCancel);

            if (dragging) {
              const targetEl = getDropTargetAt(upEvent.clientX, upEvent.clientY);
              if (targetEl) {
                const target = targetEl.dataset.dropTarget === "source"
                  ? "source"
                  : Number(targetEl.dataset.dropTarget);
                movePiece(id, target);
              }
              cleanup();
              return;
            }

            toggleSelectedPiece(id);
            cleanup();
          };

          const onCancel = (cancelEvent) => {
            if (cancelEvent.pointerId !== pointerId) return;
            element.removeEventListener("pointermove", onMove);
            element.removeEventListener("pointerup", onUp);
            element.removeEventListener("pointercancel", onCancel);
            cleanup();
          };

          state.dragCleanup = cleanup;
          element.addEventListener("pointermove", onMove, { passive: false });
          element.addEventListener("pointerup", onUp);
          element.addEventListener("pointercancel", onCancel);
        }, { passive: false });
      }

      function getDropTargetAt(x, y) {
        const stack = document.elementsFromPoint ? document.elementsFromPoint(x, y) : [document.elementFromPoint(x, y)];
        for (const item of stack) {
          const target = item?.closest?.("[data-drop-target]");
          if (target) return target;
        }
        return null;
      }

      function toggleSelectedPiece(id) {
        state.selectedPiece = state.selectedPiece === id ? null : id;
        renderPieces();
        highlightDropTargets(state.selectedPiece !== null);
      }

      function movePiece(id, target) {
        const piece = state.pieces.find((item) => item.id === id);
        if (!piece) return;
        piece.place = target;
        state.selectedPiece = null;
        highlightDropTargets(false);
        renderPieces();
      }

      function updateCounts() {
        const sourceLeft = state.pieces.filter((piece) => piece.place === "source").length;
        $("#sourceCount").textContent = `${sourceLeft}개`;

        const counts = getBasketCounts();
        counts.forEach((count, index) => {
          const badge = $(`[data-count-for="${index}"]`);
          const card = $(`.basket-card[data-drop-target="${index}"]`);
          if (badge) badge.textContent = `${count}개`;
          if (card) {
            card.classList.toggle("complete", count === TARGET_PER_BASKET);
            card.classList.toggle("over", count > TARGET_PER_BASKET);
          }
        });
      }

      function getBasketCounts() {
        return Array.from({ length: BASKET_COUNT }, (_, index) =>
          state.pieces.filter((piece) => piece.place === index).length
        );
      }

      function highlightDropTargets(on) {
        $$("[data-drop-target]").forEach((target) => target.classList.toggle("drop-ready", on));
      }

      function getOverlayRoot() {
        return document.fullscreenElement || document.webkitFullscreenElement || $(".activity") || document.body;
      }

      async function toggleFullscreen() {
        const fullscreenElement = document.fullscreenElement || document.webkitFullscreenElement;
        try {
          if (fullscreenElement) {
            if (document.exitFullscreen) await document.exitFullscreen();
            else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
          } else {
            const target = $(".activity") || document.documentElement;
            if (target.requestFullscreen) await target.requestFullscreen();
            else if (target.webkitRequestFullscreen) await target.webkitRequestFullscreen();
          }
        } catch (error) {
          console.warn("전체화면 전환을 할 수 없습니다.", error);
        } finally {
          updateFullscreenButton();
        }
      }

      function updateFullscreenButton() {
        const button = $("#fullscreenBtn");
        if (!button) return;
        const isFull = Boolean(document.fullscreenElement || document.webkitFullscreenElement);
        button.textContent = isFull ? "전체화면 해제" : "전체화면";
        button.setAttribute("aria-pressed", String(isFull));
      }

      function saveState() {
        try {
          const snapshot = {
            pieces: state.pieces.map((piece) => ({ id: piece.id, place: piece.place })),
            selectedPiece: state.selectedPiece
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
        } catch (error) { /* ignore */ }
      }

      function restoreState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const saved = JSON.parse(raw);
          if (!saved || !Array.isArray(saved.pieces) || saved.pieces.length !== TOTAL) return;
          const savedById = new Map(saved.pieces.map((piece) => [Number(piece.id), normalizePlace(piece.place)]));
          state.pieces = Array.from({ length: TOTAL }, (_, index) => ({
            id: index,
            place: savedById.has(index) ? savedById.get(index) : "source"
          }));
          const selected = Number(saved.selectedPiece);
          state.selectedPiece = Number.isInteger(selected) && selected >= 0 && selected < TOTAL ? selected : null;
        } catch (error) {
          clearSavedState();
        }
      }

      function normalizePlace(place) {
        if (place === "source") return "source";
        const number = Number(place);
        return Number.isInteger(number) && number >= 0 && number < BASKET_COUNT ? number : "source";
      }

      function clearSavedState() {
        try { localStorage.removeItem(STORAGE_KEY); } catch (error) { /* ignore */ }
      }
    })();
  </script>
</body>
</html>
