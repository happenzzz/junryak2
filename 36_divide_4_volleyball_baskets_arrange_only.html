<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>36÷4 배구공 배열하기</title>
  <style>
    :root {
      --ink: #142136;
      --navy: #233d67;
      --teal: #11bdc8;
      --teal-dark: #078391;
      --green: #63c94d;
      --red: #ff5f6d;
      --card: rgba(255, 255, 255, .94);
      --line: rgba(35, 61, 103, .16);
      --shadow: 0 18px 42px rgba(35, 61, 103, .14);
      --ball-source: clamp(28px, 2.4vw, 44px);
      --ball-basket: clamp(34px, 2.95vw, 58px);
      --radius: clamp(20px, 1.5vw, 30px);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overscroll-behavior: none;
    }

    body {
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 3% -5%, rgba(255, 229, 131, .98) 0 210px, transparent 211px),
        radial-gradient(circle at 96% 0%, rgba(17, 189, 200, .22) 0 260px, transparent 261px),
        linear-gradient(135deg, #f3fbff 0%, #fbfffb 48%, #fff8e8 100%);
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    button { font: inherit; border: 0; cursor: pointer; user-select: none; }
    button:focus-visible { outline: 0; box-shadow: 0 0 0 6px rgba(17, 189, 200, .24); }

    .activity {
      width: min(1920px, 100%);
      height: 100dvh;
      margin: 0 auto;
      padding: clamp(10px, 1.15vw, 22px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: clamp(10px, .9vw, 16px);
      position: relative;
    }

    .activity:fullscreen,
    .activity:-webkit-full-screen {
      width: 100vw;
      height: 100vh;
      max-width: none;
      background:
        radial-gradient(circle at 3% -5%, rgba(255, 229, 131, .98) 0 210px, transparent 211px),
        radial-gradient(circle at 96% 0%, rgba(17, 189, 200, .22) 0 260px, transparent 261px),
        linear-gradient(135deg, #f3fbff 0%, #fbfffb 48%, #fff8e8 100%);
    }

    .source-panel,
    .basket-card {
      background: var(--card);
      border: 3px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .source-panel {
      min-height: clamp(116px, 15vh, 176px);
      padding: clamp(10px, .9vw, 16px) clamp(12px, 1.1vw, 20px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: clamp(8px, .6vw, 12px);
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
      overflow: visible;
    }

    .source-panel.drop-ready,
    .basket-card.drop-ready {
      border-color: rgba(17, 189, 200, .76);
      box-shadow: 0 0 0 7px rgba(17, 189, 200, .14), var(--shadow);
      transform: translateY(-1px);
    }

    .source-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: clamp(10px, 1vw, 18px);
      min-width: 0;
    }

    .title-wrap {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 13px;
      border-radius: 999px;
      background: #e9fcff;
      color: var(--teal-dark);
      font-size: clamp(15px, 1vw, 20px);
      font-weight: 1000;
      letter-spacing: -.04em;
      white-space: nowrap;
    }

    .title {
      color: var(--navy);
      font-size: clamp(24px, 2vw, 40px);
      line-height: 1.05;
      font-weight: 1000;
      letter-spacing: -0.06em;
      word-break: keep-all;
    }

    .source-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 9px;
      flex-wrap: wrap;
    }

    .count-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: clamp(94px, 6.8vw, 132px);
      min-height: clamp(40px, 2.8vw, 54px);
      padding: 8px 15px;
      border-radius: 999px;
      background: var(--navy);
      color: #fff;
      font-size: clamp(17px, 1.15vw, 24px);
      line-height: 1;
      font-weight: 1000;
      white-space: nowrap;
      box-shadow: 0 7px 0 rgba(35, 61, 103, .15);
    }

    .mini-btn,
    .fullscreen-toggle {
      min-height: clamp(40px, 2.8vw, 54px);
      padding: 8px clamp(12px, 1vw, 18px);
      border-radius: 999px;
      font-size: clamp(14px, .95vw, 20px);
      font-weight: 1000;
      letter-spacing: -.045em;
      white-space: nowrap;
      transition: transform .12s ease, filter .12s ease, opacity .12s ease;
    }

    .mini-btn { background: #eef7ff; color: var(--navy); box-shadow: inset 0 -4px 0 rgba(35, 61, 103, .07); }
    .fullscreen-toggle { background: #e9fcff; color: var(--teal-dark); border: 2px solid rgba(17, 189, 200, .28); }
    .mini-btn:active,
    .fullscreen-toggle:active { transform: translateY(2px); }

    .source-items {
      min-height: calc(var(--ball-source) + 8px);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      align-content: center;
      gap: clamp(4px, .45vw, 8px);
      min-width: 0;
      overflow: visible;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      overflow: visible;
      position: relative;
    }

    .board {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: clamp(12px, 1vw, 20px);
      overflow: visible;
      position: relative;
    }

    .basket-card {
      min-height: 0;
      padding: clamp(14px, 1.05vw, 22px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: clamp(9px, .8vw, 14px);
      position: relative;
      overflow: visible;
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    }

    .basket-card.complete {
      border-color: rgba(99, 201, 77, .78);
      box-shadow: 0 0 0 7px rgba(99, 201, 77, .14), var(--shadow);
    }

    .basket-card.over {
      border-color: rgba(255, 95, 109, .72);
      box-shadow: 0 0 0 7px rgba(255, 95, 109, .12), var(--shadow);
    }

    .basket-head {
      min-height: 0;
      display: grid;
      grid-template-columns: clamp(64px, 5vw, 94px) minmax(0, 1fr);
      gap: clamp(9px, .8vw, 14px);
      align-items: center;
      position: relative;
      z-index: 10;
    }

    .basket-icon {
      display: grid;
      place-items: center;
      width: clamp(62px, 4.9vw, 92px);
      height: clamp(62px, 4.9vw, 92px);
      border-radius: 22px;
      background: linear-gradient(180deg, #fff6d0, #ffd57d);
      border: 3px solid rgba(125, 79, 10, .18);
      font-size: clamp(38px, 3vw, 58px);
      box-shadow: inset 0 -5px 0 rgba(125, 79, 10, .10), 0 8px 14px rgba(35, 61, 103, .08);
    }

    .basket-copy { min-width: 0; display: grid; gap: 7px; }

    .basket-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .basket-name {
      min-width: 0;
      color: var(--navy);
      font-size: clamp(23px, 1.7vw, 36px);
      line-height: 1;
      font-weight: 1000;
      letter-spacing: -0.055em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .basket-count {
      flex: 0 0 auto;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(35, 61, 103, .10);
      color: #33445f;
      font-size: clamp(17px, 1.15vw, 24px);
      line-height: 1;
      font-weight: 1000;
      white-space: nowrap;
    }

    .basket-area {
      min-height: 0;
      position: relative;
      border-radius: clamp(18px, 1.4vw, 28px);
      background: linear-gradient(180deg, rgba(255, 255, 255, .46), rgba(247, 251, 255, .72));
      overflow: hidden;
      isolation: isolate;
    }

    .basket-shape {
      position: absolute;
      left: 4%;
      right: 4%;
      top: 7%;
      bottom: 6%;
      border-radius: 24% 24% 44% 44% / 22% 22% 52% 52%;
      background:
        repeating-linear-gradient(90deg, rgba(117, 72, 19, .14) 0 10px, transparent 10px 22px),
        linear-gradient(180deg, #fff3c6 0%, #ffe2a3 48%, #f3b45c 100%);
      border: clamp(4px, .35vw, 6px) solid #d8964b;
      box-shadow: inset 0 -12px 14px rgba(117, 72, 19, .12), 0 12px 16px rgba(35, 61, 103, .06);
      pointer-events: none;
      z-index: 1;
    }

    .basket-shape::before {
      content: "";
      position: absolute;
      left: 14%;
      right: 14%;
      top: -13%;
      height: 38%;
      border-radius: 50% 50% 0 0;
      border: clamp(4px, .35vw, 6px) solid #d8964b;
      border-bottom: 0;
      background: transparent;
    }

    .drop-pad {
      position: absolute;
      left: 8%;
      right: 8%;
      top: 17%;
      bottom: 12%;
      z-index: 3;
      display: grid;
      place-items: center;
      border: 2px dashed rgba(35, 61, 103, .13);
      border-radius: 24% 24% 42% 42% / 18% 18% 50% 50%;
      background: rgba(255, 255, 255, .20);
      transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
    }

    .basket-card.drop-ready .drop-pad {
      border-color: rgba(17, 189, 200, .67);
      background: rgba(233, 252, 255, .32);
      box-shadow: inset 0 0 0 5px rgba(17, 189, 200, .05);
    }

    .basket-items {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      align-items: center;
      gap: clamp(5px, .55vw, 10px);
      padding: clamp(12px, 1vw, 20px);
      position: relative;
      z-index: 4;
    }

    .ball {
      width: var(--ball-source);
      height: var(--ball-source);
      flex: 0 0 var(--ball-source);
      padding: 0;
      border-radius: 50%;
      border: 0;
      background: transparent;
      touch-action: none;
      cursor: grab;
      position: relative;
      transition: transform .12s ease, filter .12s ease, opacity .12s ease;
      display: grid;
      place-items: center;
    }

    .basket-items .ball {
      width: var(--ball-basket);
      height: var(--ball-basket);
      flex-basis: var(--ball-basket);
    }

    .ball-face {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 34% 28%, #ffffff 0 19%, transparent 20%),
        conic-gradient(from 15deg, #fff 0 18%, #dff6ff 18% 29%, #fff 29% 49%, #dff6ff 49% 60%, #fff 60% 81%, #dff6ff 81% 92%, #fff 92% 100%);
      border: 2px solid rgba(35, 61, 103, .18);
      box-shadow: inset -5px -7px 8px rgba(35, 61, 103, .10), 0 5px 2px rgba(35, 61, 103, .16);
    }

    .ball-face::before,
    .ball-face::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(35, 61, 103, .22);
      inset: 22%;
      transform: rotate(28deg);
      pointer-events: none;
    }

    .ball-face::after {
      inset: 30% 16% 18% 16%;
      transform: rotate(-32deg);
      border-left-color: transparent;
      border-bottom-color: transparent;
    }

    .ball.selected { transform: translateY(-4px) scale(1.08); }
    .ball.selected::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 5px solid rgba(17, 189, 200, .78);
      box-shadow: 0 0 0 6px rgba(17, 189, 200, .16);
      pointer-events: none;
    }

    .ball.is-being-dragged { opacity: .25; }

    .drag-ghost {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      margin: 0;
      transform-origin: center center;
      transform: scale(1.16) rotate(-7deg);
      filter: drop-shadow(0 16px 18px rgba(0, 0, 0, .18));
    }

    .activity:fullscreen .drag-ghost,
    .activity:-webkit-full-screen .drag-ghost { z-index: 2147483647; }

    @media (max-width: 1280px) and (orientation: landscape) {
      :root { --ball-source: clamp(24px, 2vw, 34px); --ball-basket: clamp(28px, 2.35vw, 42px); }
      .activity { padding: 10px; gap: 10px; }
      .source-panel { min-height: 112px; }
      .source-items { gap: 4px; }
      .basket-card { padding: 10px; }
      .basket-head { grid-template-columns: 54px minmax(0, 1fr); }
      .basket-icon { width: 52px; height: 52px; font-size: 32px; border-radius: 16px; }
      .basket-name { font-size: 21px; }
      .basket-count { font-size: 15px; }
    }

    @media (max-width: 980px), (orientation: portrait) {
      :root {
        --ball-source: clamp(21px, 4.5vw, 30px);
        --ball-basket: clamp(25px, 5vw, 34px);
      }
      body { overflow: hidden; touch-action: manipulation; }
      .activity { height: 100svh; min-height: 0; padding: 8px; gap: 8px; }
      .source-panel { min-height: auto; padding: 8px 10px; gap: 6px; }
      .source-head { align-items: flex-start; flex-wrap: wrap; gap: 8px; }
      .title-wrap { gap: 6px; }
      .eyebrow { font-size: 12px; padding: 4px 9px; }
      .title { font-size: clamp(18px, 4.8vw, 26px); }
      .source-actions { justify-content: flex-start; gap: 6px; }
      .count-pill, .mini-btn, .fullscreen-toggle { min-height: 34px; font-size: 13px; padding: 6px 10px; }
      .source-items { gap: 3px; }
      .workspace { overflow: hidden; }
      .board {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
        gap: 8px;
        overflow: hidden;
      }
      .basket-card { min-height: 0; padding: 8px; gap: 7px; }
      .basket-head { grid-template-columns: 46px minmax(0, 1fr); gap: 7px; }
      .basket-icon { width: 44px; height: 44px; font-size: 27px; border-radius: 14px; }
      .basket-name { font-size: clamp(17px, 4.1vw, 22px); }
      .basket-count { font-size: 13px; padding: 5px 8px; }
      .basket-items { gap: 3px; padding: 7px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <main class="activity" aria-label="36 나누기 4 배구공 배열 활동">
    <section id="sourcePanel" class="source-panel" data-drop-target="source" aria-label="남은 배구공">
      <div class="source-head">
        <div class="title-wrap">
          <div class="eyebrow">36÷4</div>
          <div class="title">36개 배구공을 바구니 4통에 넣어 봅시다</div>
        </div>
        <div class="source-actions" aria-label="활동 조작 버튼">
          <span id="sourceCount" class="count-pill">36개</span>
          <button id="fullscreenBtn" class="fullscreen-toggle" type="button" aria-pressed="false">전체화면</button>
          <button id="clearSelectionBtn" class="mini-btn" type="button">선택 해제</button>
          <button id="resetBtn" class="mini-btn" type="button">처음으로</button>
        </div>
      </div>
      <div id="sourceItems" class="source-items" aria-label="남은 배구공 목록"></div>
    </section>

    <section class="workspace">
      <section id="board" class="board" aria-label="바구니 4통">
        <article class="basket-card" data-drop-target="0">
          <div class="basket-head">
            <div class="basket-icon" aria-hidden="true">🧺</div>
            <div class="basket-copy">
              <div class="basket-name-row">
                <div class="basket-name">1번 바구니</div>
                <div class="basket-count" data-count-for="0">0개</div>
              </div>
            </div>
          </div>
          <div class="basket-area">
            <div class="basket-shape" aria-hidden="true"></div>
            <div class="drop-pad"><div class="basket-items" data-basket-items="0"></div></div>
          </div>
        </article>

        <article class="basket-card" data-drop-target="1">
          <div class="basket-head">
            <div class="basket-icon" aria-hidden="true">🧺</div>
            <div class="basket-copy">
              <div class="basket-name-row">
                <div class="basket-name">2번 바구니</div>
                <div class="basket-count" data-count-for="1">0개</div>
              </div>
            </div>
          </div>
          <div class="basket-area">
            <div class="basket-shape" aria-hidden="true"></div>
            <div class="drop-pad"><div class="basket-items" data-basket-items="1"></div></div>
          </div>
        </article>

        <article class="basket-card" data-drop-target="2">
          <div class="basket-head">
            <div class="basket-icon" aria-hidden="true">🧺</div>
            <div class="basket-copy">
              <div class="basket-name-row">
                <div class="basket-name">3번 바구니</div>
                <div class="basket-count" data-count-for="2">0개</div>
              </div>
            </div>
          </div>
          <div class="basket-area">
            <div class="basket-shape" aria-hidden="true"></div>
            <div class="drop-pad"><div class="basket-items" data-basket-items="2"></div></div>
          </div>
        </article>

        <article class="basket-card" data-drop-target="3">
          <div class="basket-head">
            <div class="basket-icon" aria-hidden="true">🧺</div>
            <div class="basket-copy">
              <div class="basket-name-row">
                <div class="basket-name">4번 바구니</div>
                <div class="basket-count" data-count-for="3">0개</div>
              </div>
            </div>
          </div>
          <div class="basket-area">
            <div class="basket-shape" aria-hidden="true"></div>
            <div class="drop-pad"><div class="basket-items" data-basket-items="3"></div></div>
          </div>
        </article>
      </section>
    </section>
  </main>

  <script>
    (() => {
      const TOTAL = 36;
      const BASKET_COUNT = 4;
      const TARGET_PER_BASKET = TOTAL / BASKET_COUNT;
      const STORAGE_KEY = "volleyballDivision36by4:arrangeOnly:v1";
      const state = {
        pieces: [],
        selectedPiece: null,
        dragCleanup: null
      };

      const $ = (selector) => document.querySelector(selector);
      const $$ = (selector) => Array.from(document.querySelectorAll(selector));

      document.addEventListener("DOMContentLoaded", init);

      function init() {
        resetPieces(false);
        restoreState();
        attachEvents();
        renderPieces();
        updateFullscreenButton();
      }

      function attachEvents() {
        $("#resetBtn").addEventListener("click", resetAll);
        $("#clearSelectionBtn").addEventListener("click", clearSelection);
        $("#fullscreenBtn")?.addEventListener("click", (event) => {
          event.stopPropagation();
          toggleFullscreen();
        });

        document.addEventListener("fullscreenchange", updateFullscreenButton);
        document.addEventListener("webkitfullscreenchange", updateFullscreenButton);

        $("#sourcePanel").addEventListener("click", (event) => {
          if (event.target.closest(".ball") || event.target.closest("button")) return;
          if (state.selectedPiece !== null) movePiece(state.selectedPiece, "source");
        });

        $$(".basket-card").forEach((card) => {
          const target = Number(card.dataset.dropTarget);
          card.addEventListener("click", (event) => {
            if (event.target.closest(".ball") || event.target.closest("button")) return;
            if (state.selectedPiece !== null) movePiece(state.selectedPiece, target);
          });
        });

        window.addEventListener("resize", () => {
          if (state.selectedPiece !== null) highlightDropTargets(true);
        });
      }

      function resetPieces(clearStorage = true) {
        state.pieces = Array.from({ length: TOTAL }, (_, index) => ({
          id: index,
          place: "source"
        }));
        state.selectedPiece = null;
        if (clearStorage) clearSavedState();
      }

      function resetAll() {
        if (state.dragCleanup) state.dragCleanup();
        resetPieces(true);
        highlightDropTargets(false);
        renderPieces();
      }

      function clearSelection() {
        state.selectedPiece = null;
        highlightDropTargets(false);
        renderPieces();
        saveState();
      }

      function renderPieces() {
        const sourceItems = $("#sourceItems");
        sourceItems.innerHTML = "";
        $$('[data-basket-items]').forEach((zone) => { zone.innerHTML = ""; });

        state.pieces.forEach((piece) => {
          const element = createBallElement(piece);
          if (piece.place === "source") {
            sourceItems.appendChild(element);
          } else {
            const basket = $(`[data-basket-items="${piece.place}"]`);
            if (basket) basket.appendChild(element);
          }
        });

        updateCounts();
        saveState();
      }

      function createBallElement(piece) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `ball${state.selectedPiece === piece.id ? " selected" : ""}`;
        button.dataset.id = String(piece.id);
        button.setAttribute("aria-label", `배구공 ${piece.id + 1}`);
        button.innerHTML = `<span class="ball-face" aria-hidden="true"></span>`;
        attachBallPointer(button);
        return button;
      }

      function attachBallPointer(element) {
        element.addEventListener("pointerdown", (event) => {
          if (typeof event.button === "number" && event.button !== 0) return;
          event.preventDefault();
          event.stopPropagation();

          if (state.dragCleanup) state.dragCleanup();

          const id = Number(element.dataset.id);
          const startX = event.clientX;
          const startY = event.clientY;
          let dragging = false;
          let ghost = null;

          const onMove = (moveEvent) => {
            const distance = Math.hypot(moveEvent.clientX - startX, moveEvent.clientY - startY);
            if (!dragging && distance > 7) {
              dragging = true;
              ghost = element.cloneNode(true);
              ghost.classList.add("drag-ghost");
              ghost.classList.remove("selected");
              ghost.style.width = `${element.offsetWidth}px`;
              ghost.style.height = `${element.offsetHeight}px`;
              ghost.style.left = `${moveEvent.clientX - element.offsetWidth / 2}px`;
              ghost.style.top = `${moveEvent.clientY - element.offsetHeight / 2}px`;
              getOverlayRoot().appendChild(ghost);
              element.classList.add("is-being-dragged");
              highlightDropTargets(true);
            }
            if (dragging && ghost) {
              ghost.style.left = `${moveEvent.clientX - ghost.offsetWidth / 2}px`;
              ghost.style.top = `${moveEvent.clientY - ghost.offsetHeight / 2}px`;
            }
          };

          const cleanup = () => {
            if (ghost) ghost.remove();
            element.classList.remove("is-being-dragged");
            highlightDropTargets(false);
            state.dragCleanup = null;
          };

          const onUp = (upEvent) => {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            window.removeEventListener("pointercancel", onCancel);

            if (dragging) {
              const targetEl = document.elementFromPoint(upEvent.clientX, upEvent.clientY)?.closest("[data-drop-target]");
              if (targetEl) {
                const target = targetEl.dataset.dropTarget === "source" ? "source" : Number(targetEl.dataset.dropTarget);
                movePiece(id, target);
              }
              cleanup();
              return;
            }

            toggleSelectedPiece(id);
            state.dragCleanup = null;
          };

          const onCancel = () => {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            window.removeEventListener("pointercancel", onCancel);
            cleanup();
          };

          state.dragCleanup = cleanup;
          window.addEventListener("pointermove", onMove, { passive: false });
          window.addEventListener("pointerup", onUp);
          window.addEventListener("pointercancel", onCancel);
        });
      }

      function toggleSelectedPiece(id) {
        state.selectedPiece = state.selectedPiece === id ? null : id;
        renderPieces();
        highlightDropTargets(state.selectedPiece !== null);
      }

      function movePiece(id, target) {
        const piece = state.pieces.find((item) => item.id === id);
        if (!piece) return;
        piece.place = target;
        state.selectedPiece = null;
        highlightDropTargets(false);
        renderPieces();
      }

      function updateCounts() {
        const sourceLeft = state.pieces.filter((piece) => piece.place === "source").length;
        $("#sourceCount").textContent = `${sourceLeft}개`;

        const counts = getBasketCounts();
        counts.forEach((count, index) => {
          const badge = $(`[data-count-for="${index}"]`);
          const card = $(`.basket-card[data-drop-target="${index}"]`);
          if (badge) badge.textContent = `${count}개`;
          if (card) {
            card.classList.toggle("complete", count === TARGET_PER_BASKET);
            card.classList.toggle("over", count > TARGET_PER_BASKET);
          }
        });
      }

      function getBasketCounts() {
        return Array.from({ length: BASKET_COUNT }, (_, index) =>
          state.pieces.filter((piece) => piece.place === index).length
        );
      }

      function highlightDropTargets(on) {
        $$('[data-drop-target]').forEach((target) => target.classList.toggle("drop-ready", on));
      }

      function getOverlayRoot() {
        return document.fullscreenElement || document.webkitFullscreenElement || $(".activity") || document.body;
      }

      async function toggleFullscreen() {
        const fullscreenElement = document.fullscreenElement || document.webkitFullscreenElement;
        try {
          if (fullscreenElement) {
            if (document.exitFullscreen) await document.exitFullscreen();
            else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
          } else {
            const target = $(".activity") || document.documentElement;
            if (target.requestFullscreen) await target.requestFullscreen();
            else if (target.webkitRequestFullscreen) await target.webkitRequestFullscreen();
          }
        } catch (error) {
          console.warn("전체화면 전환을 할 수 없습니다.", error);
        } finally {
          updateFullscreenButton();
        }
      }

      function updateFullscreenButton() {
        const button = $("#fullscreenBtn");
        if (!button) return;
        const isFull = Boolean(document.fullscreenElement || document.webkitFullscreenElement);
        button.textContent = isFull ? "전체화면 해제" : "전체화면";
        button.setAttribute("aria-pressed", String(isFull));
      }

      function saveState() {
        try {
          const snapshot = {
            pieces: state.pieces.map((piece) => ({ id: piece.id, place: piece.place })),
            selectedPiece: state.selectedPiece
          };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
        } catch (error) { /* ignore */ }
      }

      function restoreState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const saved = JSON.parse(raw);
          if (!saved || !Array.isArray(saved.pieces) || saved.pieces.length !== TOTAL) return;
          const savedById = new Map(saved.pieces.map((piece) => [Number(piece.id), normalizePlace(piece.place)]));
          state.pieces = Array.from({ length: TOTAL }, (_, index) => ({
            id: index,
            place: savedById.has(index) ? savedById.get(index) : "source"
          }));
          const selected = Number(saved.selectedPiece);
          state.selectedPiece = Number.isInteger(selected) && selected >= 0 && selected < TOTAL ? selected : null;
        } catch (error) {
          clearSavedState();
        }
      }

      function normalizePlace(place) {
        if (place === "source") return "source";
        const number = Number(place);
        return Number.isInteger(number) && number >= 0 && number < BASKET_COUNT ? number : "source";
      }

      function clearSavedState() {
        try { localStorage.removeItem(STORAGE_KEY); } catch (error) { /* ignore */ }
      }
    })();
  </script>
</body>
</html>
